<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Checkbox List</title>

    <style>
      body {
        font-family: Arial, sans-serif;
        background: #f5f5f5;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
      }

      .list {
        background: white;
        padding: 20px;
        border-radius: 10px;
        width: 250px;
        box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
      }

      .item {
        display: flex;
        align-items: center;
        gap: 10px;
        padding: 8px 0;
        border-bottom: 1px solid #eee;
      }

      .item:last-child {
        border-bottom: none;
      }

      input[type="checkbox"] {
        width: 18px;
        height: 18px;
        cursor: pointer;
      }

      label {
        cursor: pointer;
      }
    </style>
  </head>

  <body>
    <div class="list">
      <input type="checkbox" id="selectAll" />

      <div class="item">
        <input type="checkbox" id="item1" />
        <label for="item1">Morning Workout</label>
      </div>

      <div class="item">
        <input type="checkbox" id="item2" />
        <label for="item2">Drink Water</label>
      </div>

      <div class="item">
        <input type="checkbox" id="item3" />
        <label for="item3">Read Book</label>
      </div>

      <div class="item">
        <input type="checkbox" id="item4" />
        <label for="item4">Study Programming</label>
      </div>

      <div class="item">
        <input type="checkbox" id="item5" />
        <label for="item5">Practice Coding</label>
      </div>

      <div class="item">
        <input type="checkbox" id="item6" />
        <label for="item6">Go for Walk</label>
      </div>

      <div class="item">
        <input type="checkbox" id="item7" />
        <label for="item7">Meditation</label>
      </div>

      <div class="item">
        <input type="checkbox" id="item8" />
        <label for="item8">Drink Smoothie</label>
      </div>

      <div class="item">
        <input type="checkbox" id="item9" />
        <label for="item9">Sleep Early</label>
      </div>
    </div>

    <script>
      const selectAllBtn = document.querySelector("#selectAll");
      const checkboxes = document.querySelectorAll(".item input");
      let lastChecked;

      function checkAll() {
        if(selectAllBtn.checked) {
          checkboxes.forEach(checkBox => {
            let label = checkBox.nextElementSibling;
            label.style.textDecoration = checkBox.checked ? 'line-through' : 'none';
          })
        } else {
          checkboxes.forEach(checkBox => {
            let label = checkBox.nextElementSibling;
            label.style.textDecoration = checkBox.checked ? 'line-through' : 'none';
          })
        }
      }

      function handleCheck(e) {
        let inBetween = false;

        let label = this.nextElementSibling;
        label.style.textDecoration = this.checked ? 'line-through' : 'none';
        
        if (this.checked && e.shiftKey) {
          checkboxes.forEach((checkBox) => {
            label = checkBox.nextElementSibling
            if (checkBox === this || checkBox === lastChecked) {
              inBetween = !inBetween;
            }
            if (inBetween) {
              checkBox.checked = true;
              label.style.textDecoration = checkBox.checked ? 'line-through' : 'none';
              console.log(label);
              
            }
          });
        }

        lastChecked = this;
      }
      
      selectAllBtn.addEventListener("click", checkAll);
      checkboxes.forEach(checkBox => {
        checkBox.addEventListener("click", handleCheck);
      });
    </script>
  </body>
</html>
